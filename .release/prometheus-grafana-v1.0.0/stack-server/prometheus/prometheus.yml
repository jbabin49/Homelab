global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node_exporter
    static_configs:
      - targets:
          - "10.0.0.10:9100"  # monitoring server
          - "10.0.0.21:9100"  # node-1
          - "10.0.0.22:9100"  # node-2
          - "10.0.0.23:9100"  # node-3

  - job_name: cadvisor
    static_configs:
      - targets:
          - "10.0.0.10:8080"  # monitoring server
          - "10.0.0.21:8080"  # node-1
          - "10.0.0.22:8080"  # node-2
          - "10.0.0.23:8080"  # node-3

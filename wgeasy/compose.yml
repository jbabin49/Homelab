services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    restart: unless-stopped
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    environment:
      - LANG=fr
      - WG_HOST=<CHANGE_ME_PUBLIC_IP_OR_DOMAIN>
      - PASSWORD_HASH=<CHANGE_ME_BCRYPT_HASH>
      - WG_DEFAULT_DNS=<CHANGE_ME_ADGUARD_IP>
      - WG_ALLOWED_IPS=192.168.1.0/24
    volumes:
      - wg-easy_etc_wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  wg-easy_etc_wireguard:
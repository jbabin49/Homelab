# Nginx Proxy Manager — Advanced Snippet pour Authelia (forward auth)
# À coller dans le champ "Custom Nginx Configuration" de chaque proxy host
# protégé par Authelia.
#
# Documentation : https://www.authelia.com/integration/proxies/nginx-proxy-manager/
#
# Le proxy host doit pointer vers le service backend (ex: zabbix-web:8080).
# Ce snippet ajoute l'authentification Authelia avant chaque requête.

location /authelia {
    internal;
    set $upstream_authelia http://authelia:9091/api/authz/auth-request;
    proxy_pass $upstream_authelia;
    proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
    proxy_set_header X-Original-Method $request_method;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header Content-Length "";
    proxy_set_header Connection "";
    proxy_pass_request_body off;
}

auth_request /authelia;
auth_request_set $target_url $scheme://$http_host$request_uri;
auth_request_set $user $upstream_http_remote_user;
auth_request_set $groups $upstream_http_remote_groups;
auth_request_set $name $upstream_http_remote_name;
auth_request_set $email $upstream_http_remote_email;
proxy_set_header Remote-User $user;
proxy_set_header Remote-Groups $groups;
proxy_set_header Remote-Name $name;
proxy_set_header Remote-Email $email;

# Redirection vers le portail Authelia si non authentifié
error_page 401 =302 https://auth.CHANGE_ME_DOMAIN/?rd=$target_url;

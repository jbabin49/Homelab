# /etc/nginx/sites-available/guacamole
# Reverse proxy HTTPS pour Guacamole derrière Cloudflare (proxy orange, Full strict)
# Origin TLS = Cloudflare Origin Certificate (voir DEPLOYMENT.md §4.3)
#
# Prérequis (contexte http) :
#   - /etc/nginx/conf.d/websocket.conf          -> map $connection_upgrade (voir DEPLOYMENT.md §4.6)
#   - /etc/nginx/conf.d/cloudflare-realip.conf  -> set_real_ip_from ...   (voir DEPLOYMENT.md §4.4)

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bastion.example.com;

    # --- Certificat Origin Cloudflare (validité 15 ans, pas de renouvellement) ---
    ssl_certificate     /etc/ssl/cloudflare/bastion.pem;
    ssl_certificate_key /etc/ssl/cloudflare/bastion.key;

    # --- Authenticated Origin Pulls : n'accepter QUE les connexions Cloudflare (mTLS) ---
    ssl_client_certificate /etc/ssl/cloudflare/origin-pull-ca.pem;
    ssl_verify_client on;

    # Durcissement TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # En-têtes de sécurité
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Transferts de fichiers RDP/SSH via Guacamole
    client_max_body_size 1g;

    location / {
        proxy_pass http://127.0.0.1:8080/guacamole/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (indispensable pour Guacamole)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_cookie_path /guacamole/ /;
        proxy_buffering off;
        access_log off;
    }
}

# Cloudflare en Full strict se connecte à l'origin en HTTPS (443) : pas besoin
# d'un server{} port 80 ici. Activer "Always Use HTTPS" côté Cloudflare pour la
# redirection navigateur. Le pare-feu du VPS ne laisse entrer 443 que depuis Cloudflare.

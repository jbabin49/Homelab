# Exemple de configuration client WireGuard pour le VPS.
# À déployer en /etc/wireguard/wg0.conf sur le VPS (chmod 600).
#
# Le VPS est CLIENT d'un serveur WireGuard distant (ex. wg-easy sur le LAN cible).
# Il compose vers l'endpoint distant en sortie ; il n'écoute rien en entrée.
#
# Deux corrections systématiques par rapport à une config brute wg-easy :
#   1. Supprimer toute ligne "DNS = ..." (sinon le résolveur du VPS pointe vers
#      un DNS interne injoignable hors tunnel -> casse apt, etc.).
#   2. Passer PersistentKeepalive de 0 à 25 (garde le tunnel vif à travers le NAT).

[Interface]
PrivateKey = <CLE_PRIVEE_CLIENT>
Address = 172.25.1.4/32
MTU = 1420
# PAS de ligne DNS ici.

[Peer]
PublicKey = <CLE_PUBLIQUE_SERVEUR>
PresharedKey = <PSK>
AllowedIPs = 192.168.1.0/24                 # le LAN distant à atteindre (resserrable en /32 par cible)
PersistentKeepalive = 25
Endpoint = <IP_PUBLIQUE_FIXE_DISTANTE>:51820
